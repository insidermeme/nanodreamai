<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinematic Vault | NanoDream</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500&display=swap"
        rel="stylesheet">
    <style>
        body {
            background: #000;
            overflow-x: hidden;
            color: var(--text-primary);
            font-family: var(--font-sans);
        }

        .vault-header {
            padding: 120px 5vw 40px;
            text-align: center;
            position: relative;
            z-index: 10;
        }

        .vault-title {
            font-family: var(--font-serif);
            font-size: clamp(2.5rem, 6vw, 4rem);
            font-weight: 400;
            letter-spacing: -0.02em;
            line-height: 1.1;
            margin-bottom: 1rem;
            color: #fff;
        }

        .vault-subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
            max-width: 600px;
            line-height: 1.6;
            margin: 0 auto;
        }

        /* Unified Archive Grid */
        .archive-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            padding: 40px 5vw 100px;
            position: relative;
            z-index: 10;
        }

        .vault-card {
            border-radius: 12px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
            transition: transform 0.4s cubic-bezier(0.2, 0, 0.2, 1), box-shadow 0.4s ease;
            position: relative;
        }

        .vault-card:hover {
            transform: scale(1.03) translateY(-5px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8), 0 0 20px rgba(255, 255, 255, 0.05);
            z-index: 20;
            border-color: rgba(255, 255, 255, 0.2);
        }

        .uniform-vimeo-container {
            position: relative;
            padding-top: 56.25%;
            /* 16:9 */
            width: 100%;
            height: 0;
            overflow: hidden;
        }

        .uniform-vimeo-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .vertical-vimeo-fit iframe {
            height: 180%;
            width: 100%;
            top: 50%;
            transform: translateY(-50%);
        }

        @media (max-width: 1024px) {
            .archive-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 20px;
            }
        }

        @media (max-width: 600px) {
            .archive-grid {
                grid-template-columns: 1fr;
                gap: 24px;
                padding: 20px 6vw 80px;
            }

            .vault-header {
                padding-top: 100px;
                text-align: left;
            }

            .vault-subtitle {
                margin: 0;
            }
        }
    </style>
</head>

<body>
    <!-- Background Elements -->
    <canvas id="starchamber"
        style="position:fixed; top:0; left:0; width:100%; height:100%; z-index:1; pointer-events:none;"></canvas>
    <canvas id="embers-canvas"
        style="position:fixed; top:0; left:0; width:100%; height:100%; z-index:2; pointer-events:none; opacity:0.3;"></canvas>

    <header class="site-header" style="z-index: 1000;">

    <div class="vault-header">

    <div class="archive-grid">
        <!-- Video 1 -->

                <iframe src="https://player.vimeo.com/video/1166649949?badge=0&autopause=0" allow="autoplay; fullscreen"
                    webkit-playsinline playsinline></iframe>

        </div>
        <!-- Video 2 -->

        <!-- Video 3 -->

        <!-- Video 4: Vertical -->

        <!-- Video 5: Vertical -->

        </div>
        <!-- Video 6 -->
